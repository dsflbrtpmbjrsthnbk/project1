version: "3.8"

services:
  odoo_db:
    image: postgres:15
    container_name: odoo_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_pass
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - odoo_net

  odoo:
    image: odoo:16.0
    container_name: odoo_app
    depends_on:
      odoo_db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      # Mount our custom module into Odoo's extra-addons path
      - ./inventoryhub_connector:/mnt/extra-addons/inventoryhub_connector
      - odoo_data:/var/lib/odoo
    environment:
      - HOST=odoo_db
      - USER=odoo
      - PASSWORD=odoo_pass
    # Use the official odoo.conf approach via environment vars
    # The official image reads HOST/USER/PASSWORD and writes /etc/odoo/odoo.conf
    command: >
      --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    networks:
      - odoo_net

volumes:
  odoo_db_data:
  odoo_data:

networks:
  odoo_net:
